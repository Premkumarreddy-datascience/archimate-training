<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <style>
      .layer-bg { fill: #f8f9fa; stroke: #ccc; stroke-width: 1.5; rx: 8; }
      .business { fill: #d9ead3; stroke: #274e13; }
      .application { fill: #cfe2f3; stroke: #0b5394; }
      .technology { fill: #fce5cd; stroke: #b45f06; }
      .infra { fill: #ead1dc; stroke: #4c1130; }
      .element { stroke-width: 1.5; rx: 6; }
      .label { font-size: 11px; text-anchor: middle; dominant-baseline: middle; fill: #1a1a1a; }
      .layer-label { font-weight: bold; font-size: 14px; fill: #333; }
    </style>
  </defs>

  <!-- Layer backgrounds -->
  <rect class="layer-bg" x="20" y="40" width="860" height="100" />
  <rect class="layer-bg" x="20" y="160" width="860" height="260" />
  <rect class="layer-bg" x="20" y="440" width="860" height="120" />
  <rect class="layer-bg" x="20" y="580" width="860" height="90" />

  <text x="450" y="65" class="layer-label">Business Layer</text>
  <text x="450" y="185" class="layer-label">Application Layer</text>
  <text x="450" y="465" class="layer-label">Technology Layer</text>
  <text x="450" y="605" class="layer-label">Physical / Infrastructure</text>

  <!-- Business elements -->
  <rect class="business element" x="60" y="80" width="160" height="40" />
  <text x="140" y="105" class="label">Frontline colleague</text>
  <rect class="business element" x="280" y="80" width="160" height="40" />
  <text x="360" y="105" class="label">Shift supervisor</text>
  <rect class="business element" x="500" y="80" width="160" height="40" />
  <text x="580" y="105" class="label">Safety officer</text>

  <!-- Application elements -->
  <rect class="application element" x="40" y="210" width="130" height="45" />
  <text x="105" y="236" class="label">Teams Bot</text>
  <rect class="application element" x="210" y="210" width="150" height="45" />
  <text x="285" y="236" class="label">RAG Orchestrator</text>
  <rect class="application element" x="400" y="210" width="150" height="45" />
  <text x="475" y="236" class="label">Azure AI Search</text>
  <rect class="application element" x="590" y="210" width="150" height="45" />
  <text x="665" y="236" class="label">Azure OpenAI</text>
  <rect class="application element" x="40" y="300" width="130" height="45" />
  <text x="105" y="326" class="label">Cosmos DB</text>
  <rect class="application element" x="210" y="300" width="150" height="45" />
  <text x="285" y="326" class="label">SharePoint API</text>
  <rect class="application element" x="400" y="300" width="150" height="45" />
  <text x="475" y="326" class="label">Entra ID (SSO)</text>

  <!-- Technology elements -->
  <rect class="technology element" x="40" y="470" width="160" height="40" />
  <text x="120" y="495" class="label">Azure App Service</text>
  <rect class="technology element" x="240" y="470" width="160" height="40" />
  <text x="320" y="495" class="label">Azure AI Search</text>
  <rect class="technology element" x="440" y="470" width="160" height="40" />
  <text x="520" y="495" class="label">Azure OpenAI (GPT-4o)</text>
  <rect class="technology element" x="640" y="470" width="160" height="40" />
  <text x="720" y="495" class="label">Cosmos DB (NoSQL)</text>

  <!-- Infrastructure -->
  <rect class="infra element" x="60" y="605" width="220" height="40" />
  <text x="170" y="630" class="label">Azure EU North region</text>
  <rect class="infra element" x="320" y="605" width="220" height="40" />
  <text x="430" y="630" class="label">Private endpoints + VNet</text>
  <rect class="infra element" x="580" y="605" width="220" height="40" />
  <text x="690" y="630" class="label">SharePoint Online (EU)</text>

  <!-- Arrows (simplified data flows) -->
  <line x1="140" y1="120" x2="105" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="105" y1="255" x2="280" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="285" y1="255" x2="395" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="475" y1="255" x2="585" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="105" y1="345" x2="120" y2="465" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="285" y1="345" x2="320" y2="465" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="475" y1="345" x2="520" y2="465" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="510" x2="170" y2="600" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="510" x2="430" y2="600" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>